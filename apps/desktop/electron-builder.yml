appId: com.openmanager.app
productName: OpenManager
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierrc,tsconfig*.json}'
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: '${productName}-Setup-${version}-${arch}.${ext}'
  oneClick: false
  allowToChangeInstallationDirectory: true
portable:
  artifactName: '${productName}-Portable-${version}-${arch}.${ext}'
publish:
  provider: github
  owner: calledforth
  repo: openmanager
