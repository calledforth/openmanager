<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.convex.cloud http://127.0.0.1:*; connect-src 'self' https://*.convex.cloud wss://*.convex.cloud http://127.0.0.1:*"

    <title>OpenManager</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }

      ::-webkit-scrollbar-thumb:hover { background: hsl(0 0% 24%); }
    </style>
  </head>

    <div id="root"></div>
